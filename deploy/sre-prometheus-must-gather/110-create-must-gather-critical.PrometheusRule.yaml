apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    prometheus: sre-create-must-gather-critical
    role: alert-rules
  name: sre-create-must-gather-critical
  namespace: openshift-monitoring
spec:
  groups:
    - name: sre-create-must-gather-critical
      rules:
        - alert: CreateMustGatherCritical
          expr: |
            max(ALERTS{alertstate="firing",alertname!~"CreateMustGather|CreateMustGatherCritical",namespace=~"openshift-.*|kube-.*|default|redhat-.*",severity="critical",namespace!~"openshift-customer-monitoring|openshift-operators|openshift-storage|openshift-compliance|openshift-operators-redhat|openshift-user-workload-monitoring",alertname!~"Watchdog|CannotRetrieveUpdates|KubeQuotaExceeded|KubeQuotaFullyUsed|CPUThrottlingHigh|NodeFilesystemSpaceFillingUp|NodeFilesystemFilesFillingUp|NodeFilesystemAlmostOutOfSpace|NodeFilesystemAlmostOutOfFiles|NodeFileDescriptorLimit|CustomResourceDetected|ImagePruningDisabled|PodDisruptionBudgetLimit|KubeJobFailed|PrometheusRuleFailures|HAProxyDown|HAProxyReloadFail|CertificateIsAboutToExpire|KubeAPIErrorBudgetBurn|CsvAbnormalFailedOver2Min|LokiTenantRateLimit|PrometheusRemoteStorageFailures"}) > 0
            and on() absent(cluster_version{type="updating"})
            and on() (time() - max(cluster_version{type="completed"}) > 14400)
          for: 15m
          labels:
            severity: info
            namespace: openshift-monitoring
            route_to_cad: "true"
          annotations:
            message: Create a must-gather for a non-silenced firing critical alert in a managed namespace
            runbook_url: https://github.com/openshift/ops-sop/blob/master/v4/alerts/CreateMustGather.md
            summary: 'This alert is a trigger for CAD to create a must-gather for critical alerts.'
            description: This alert fires when a non-silenced critical alert is firing in a managed namespace. This alert is meant to trigger configuration-anomaly-detection to create a must-gather
